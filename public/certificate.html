<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0D0D0D" />
    <title>Certificado | DEVER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=IBM+Plex+Mono:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body class="app-body">
    <header class="app-header">
      <div class="app-container app-header-inner">
        <a class="app-brand" href="dashboard.html" aria-label="DEVER">
          <img src="assets/logo.svg" alt="DEVER" width="214" height="58" />
        </a>
        <nav class="app-nav" aria-label="Certificado">
          <a href="dashboard.html">Meus cursos</a>
          <button type="button" data-logout>Sair</button>
        </nav>
      </div>
    </header>
    <main class="app-main">
      <section class="app-container certificate-shell">
        <p class="empty-state" role="status" aria-live="polite" hidden data-certificate-state></p>
        <article class="certificate-document" hidden data-certificate-document>
          <p class="app-kicker">DEVER · Certificado de conclusão</p>
          <h1>Certificamos que</h1>
          <p class="certificate-name" data-certificate-name></p>
          <p>concluiu o treinamento</p>
          <h2 data-certificate-course></h2>
          <p class="certificate-date">Emitido em <span data-certificate-date></span>.</p>
          <p class="certificate-code">Código de verificação: <strong data-certificate-code></strong></p>
          <div class="admin-actions certificate-actions">
            <a class="app-button" href="dashboard.html">Voltar aos certificados</a>
            <button class="app-button app-button-primary" type="button" data-certificate-print>Imprimir / salvar PDF</button>
          </div>
        </article>
      </section>
    </main>
    <script type="module" src="assets/js/certificate.js"></script>
  </body>
</html>
